# ──────────────────────────────────────────────────────────────
#  Inventory  –  defines all managed nodes
#  The ansible control node connects to pc1 and pc2 via the
#  private host-only network (192.168.56.x).
# ──────────────────────────────────────────────────────────────

[managed_nodes]
pc1  ansible_host=192.168.56.11
pc2  ansible_host=192.168.56.12

[managed_nodes:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=/home/vagrant/.ssh/ansible_id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# ── Optional: target the control node itself ─────────────────
[control]
ansible ansible_host=192.168.56.10 ansible_connection=local
