---
# ──────────────────────────────────────────────────────────────
#  site.yml  –  Master playbook
#  Runs the "common" role on all managed nodes (pc1 & pc2).
#  Add more roles / plays below as your lab grows.
# ──────────────────────────────────────────────────────────────

- name: Configure all managed nodes
  hosts: managed_nodes
  gather_facts: true
  become: true

  roles:
    - common

