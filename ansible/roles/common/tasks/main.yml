---
# ──────────────────────────────────────────────────────────────
#  roles/common/tasks/main.yml
#  Applied to every managed node (pc1 & pc2).
#  Extend this file with whatever packages / config you need.
# ──────────────────────────────────────────────────────────────

# 1. Update apt cache (only when it is older than 1 hour)
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

# 2. Install a baseline set of packages
- name: Install common packages
  ansible.builtin.apt:
    name:
      - vim
      - curl
      - wget
      - git
      - htop
      - net-tools
      - unzip
      - tree
      - python3
      - python3-pip
    state: present

# 3. Set the system timezone
- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

# 4. Ensure hostname is correctly set
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

# 5. Add a friendly /etc/hosts entry for every node in the lab
- name: Populate /etc/hosts with lab nodes
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED – lab nodes"
    block: |
      192.168.56.10  ansible
      192.168.56.11  pc1
      192.168.56.12  pc2

# 6. Create a shared admin user on each managed node
- name: Ensure admin user exists
  ansible.builtin.user:
    name: labadmin
    comment: "Lab Admin"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

# 7. Authorise the Ansible control-node key for labadmin too
- name: Authorise ansible key for labadmin
  ansible.posix.authorized_key:
    user: labadmin
    key: "{{ lookup('file', '/home/vagrant/.ssh/ansible_id_rsa.pub') }}"
    state: present

# 8. Harden SSH – disable root login & password auth
- name: Harden SSH configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^PermitRootLogin',    line: 'PermitRootLogin no' }
    - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
  notify: Restart SSH

# 9. Print a quick summary
- name: Show node facts
  ansible.builtin.debug:
    msg: >
      {{ inventory_hostname }} | IP: {{ ansible_default_ipv4.address }}
      | OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      | RAM: {{ ansible_memtotal_mb }} MB